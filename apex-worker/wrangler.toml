name = "meetmeatthefair-edge"
main = "src/index.ts"
workers_dev = true
# Match the project-wide compat date established by mcp-server. Bumping
# this requires re-verifying behavior against the Workers runtime in a
# preview deploy first.
compatibility_date = "2026-04-21"
compatibility_flags = ["nodejs_compat"]

# Smart Placement isn't useful here — the Worker's job is to proxy to
# Pages, which itself runs at the edge. Default placement keeps the
# Worker close to the client and lets the upstream fetch handle its own
# routing.

[vars]
# Phase B default: proxy to the Pages project's default *.pages.dev URL.
# This is the canonical reverse-proxy target — it's stable and bypasses
# the apex custom domain (so the apex Worker can sit in front without
# a routing loop).
UPSTREAM = "https://takemetothefair.pages.dev"

# K2 Phase C (2026-06-07): apex route CLAIMED. This Worker now sits
# in front of Pages for every request to meetmeatthefair.com.
#
# Why this works: a wildcard Worker route beats a Pages custom-domain
# route at the apex on Cloudflare's tiebreak (precedent: 2026-04-25
# sitemap hotfix Worker, see CLAUDE.md). The Pages project at
# takemetothefair.pages.dev stays reachable — UPSTREAM points at it,
# and the Worker proxies every request through.
#
# ROLLBACK: see apex-worker/README.md for the 3-tier rollback runbook.
# Fastest rollback is to delete the Worker route via the Cloudflare
# dashboard (Workers & Pages → Routes → delete) — Pages takes over
# instantly without a re-deploy.
[[routes]]
pattern = "meetmeatthefair.com/*"
zone_name = "meetmeatthefair.com"

# The www. subdomain redirects to apex via Cloudflare DNS rules in the
# dashboard — claiming it here would be redundant and would NOT help
# with the K2 status-rewrite goal (the apex Worker only inspects
# responses from UPSTREAM, which already serves both apex and www
# content). Leaving www. routing as-is.
