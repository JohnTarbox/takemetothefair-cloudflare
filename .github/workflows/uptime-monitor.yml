name: Uptime & Error Monitor

on:
  schedule:
    - cron: "*/30 * * * *" # Every 30 minutes
  workflow_dispatch:

jobs:
  uptime:
    name: Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check health endpoint
        id: health
        run: |
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 30 \
            "https://meetmeatthefair.com/api/health")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          cat /tmp/health.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Health check failed with HTTP $HTTP_CODE"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check homepage loads
        id: homepage
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://meetmeatthefair.com")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Homepage returned HTTP $HTTP_CODE"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check events page loads
        id: events
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://meetmeatthefair.com/events")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Events page returned HTTP $HTTP_CODE"
          fi

      - name: Check sitemap.xml
        id: sitemap
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://meetmeatthefair.com/sitemap.xml")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::sitemap.xml returned HTTP $HTTP_CODE"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check robots.txt
        id: robots
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://meetmeatthefair.com/robots.txt")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::robots.txt returned HTTP $HTTP_CODE"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on failure
        if: steps.health.outputs.healthy == 'false' || steps.homepage.outputs.healthy == 'false' || steps.sitemap.outputs.healthy == 'false' || steps.robots.outputs.healthy == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const healthCode = '${{ steps.health.outputs.http_code }}';
            const homepageCode = '${{ steps.homepage.outputs.http_code }}';
            const eventsCode = '${{ steps.events.outputs.http_code }}';
            const sitemapCode = '${{ steps.sitemap.outputs.http_code }}';
            const robotsCode = '${{ steps.robots.outputs.http_code }}';

            // Check if there's already an open downtime issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'downtime',
              per_page: 1,
            });

            if (issues.length > 0) {
              // Add comment to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Still down at ${new Date().toISOString()}\n- Health: ${healthCode}\n- Homepage: ${homepageCode}\n- Events: ${eventsCode}\n- Sitemap: ${sitemapCode}\n- Robots: ${robotsCode}`,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Site downtime detected - ${new Date().toISOString().split('T')[0]}`,
                body: `## Downtime Alert\n\n| Endpoint | Status |\n|---|---|\n| /api/health | ${healthCode} |\n| / (homepage) | ${homepageCode} |\n| /events | ${eventsCode} |\n| /sitemap.xml | ${sitemapCode} |\n| /robots.txt | ${robotsCode} |\n\nDetected at: ${new Date().toISOString()}`,
                labels: ['downtime', 'bug'],
              });
            }
