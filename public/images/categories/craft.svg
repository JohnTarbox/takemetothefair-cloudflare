  <rect x="170" y="60" width="12" height="60" rx="2" fill="#7C3AED" transform="rotate(-20 176 90)"/>
  <path d="M158 115 Q165 140 180 115" fill="#A855F7"/>
  <rect x="168" y="50" width="16" height="20" rx="3" fill="#C4B5FD" transform="rotate(-20 176 60)"/>
