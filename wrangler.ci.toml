name = "takemetothefair-ci"
compatibility_date = "2026-06-10"
compatibility_flags = ["nodejs_compat"]

# NOTE: This is wrangler.ci.toml — passed to initOpenNextCloudflareForDev as the
# getPlatformProxy config when CI=true (see next.config.mjs). A binding-only
# config for the e2e `next dev` webserver: it deliberately omits the [ai]
# binding (Workers AI has no local emulation → forces remote-proxy mode, which
# needs a Cloudflare login CI lacks). No `main`/`pages_build_output_dir` — the
# proxy only emulates bindings locally (D1/KV/R2 via miniflare). Local dev uses
# the full wrangler.toml which keeps [ai].

[[d1_databases]]
binding = "DB"
database_name = "takemetothefair-db"
database_id = "d449e416-3814-48a6-b9e8-b676333b2cdc"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b7aeca316e7a41108fd375be2e152cff"

# R2 bucket — see wrangler.toml. Mirrored here so CI builds resolve the
# binding type, even though E2E tests don't exercise R2.
[[r2_buckets]]
binding = "VENDOR_ASSETS"
bucket_name = "mmatf-vendor-assets"
