name = "takemetothefair"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# NOTE: This is wrangler.ci.toml — used by next.config.mjs:60 when CI=true.
# It deliberately omits the [ai] binding (Workers AI requires a Cloudflare
# remote proxy session, which CI runners aren't logged into). E2E tests don't
# exercise AI-backed paths, so the missing binding is fine. Local development
# uses wrangler.toml which keeps [ai].

[[d1_databases]]
binding = "DB"
database_name = "takemetothefair-db"
database_id = "d449e416-3814-48a6-b9e8-b676333b2cdc"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b7aeca316e7a41108fd375be2e152cff"
