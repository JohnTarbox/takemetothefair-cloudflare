name = "meetmeatthefair-mcp"
main = "src/index.ts"
workers_dev = true
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Smart Placement: same rationale as the main app — most MCP tools are
# D1-bound, so Cloudflare placing the Worker near the DB is the right
# default. No code change.
[placement]
mode = "smart"

[[d1_databases]]
binding = "DB"
database_name = "takemetothefair-db"
database_id = "d449e416-3814-48a6-b9e8-b676333b2cdc"

[vars]
MAIN_APP_URL = "https://meetmeatthefair.com"
# INTERNAL_API_KEY is set via `wrangler secret put INTERNAL_API_KEY`

# Service Binding to the main app — DISABLED 2026-05-03 because the bare
# `service = "takemetothefair"` form errors with Cloudflare API code 10143
# ("Worker 'takemetothefair' not found"). The binding API expects a Worker
# target; our main app is on Pages, which needs a different binding syntax
# that's still TBD. The MCP code paths are written defensively (env.MAIN_APP
# is optional; both triggerIndexNow and the cron scheduled handler fall back
# to public HTTPS via MAIN_APP_URL + INTERNAL_API_KEY). Re-enable once we
# verify the correct Pages-target syntax against the live API.
# [[services]]
# binding = "MAIN_APP"
# service = "takemetothefair"

[[routes]]
pattern = "mcp.meetmeatthefair.com"
custom_domain = true

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "80685c98cb744582bb528587d20e647a"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "MeetMeAtTheFairMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MeetMeAtTheFairMCP"]

# Cron Triggers — scheduled tasks fan out to main-app sweep endpoints via
# the MAIN_APP service binding. Conservative rollout: only the
# recommendations-scan is enabled today (it's idempotent + low-cost). Add
# additional crons here as confidence in the pattern builds; the scheduled
# handler in src/index.ts dispatches based on which cron expression fires.
[triggers]
crons = ["0 6 * * *"] # 06:00 UTC daily — overnight in NA, low-traffic window
