name = "meetmeatthefair-mcp"
main = "src/index.ts"
workers_dev = true
# Bumped from 2025-04-01 to 2026-04-21 for the Email Service Sending public
# beta, which requires this compat date or newer for the unrestricted
# `send_email` binding (no `destination_address`) to behave as the new
# outbound-anywhere binding rather than the old verified-destinations-only
# one. See CHANGELOG note 2026-04-16 (Email Sending public beta).
compatibility_date = "2026-04-21"
compatibility_flags = ["nodejs_compat"]

# Smart Placement: same rationale as the main app — most MCP tools are
# D1-bound, so Cloudflare placing the Worker near the DB is the right
# default. No code change.
[placement]
mode = "smart"

[[d1_databases]]
binding = "DB"
database_name = "takemetothefair-db"
database_id = "d449e416-3814-48a6-b9e8-b676333b2cdc"

[vars]
MAIN_APP_URL = "https://meetmeatthefair.com"
# I1 vendor-enrichment Worker (2026-06-13). Account id is non-secret; the
# Browser-Rendering token is a Worker secret set via
# `wrangler secret put CLOUDFLARE_BROWSER_RENDERING_TOKEN` (same value the main
# app holds). ENRICHMENT_DRY_RUN gates the auto-merge: unset/anything-but-
# "false" stages to vendor_enrichment_candidates only (the Phase-1 default).
# Set ENRICHMENT_DRY_RUN = "false" to enable Phase-2 auto-merge of un-flagged fills.
CLOUDFLARE_ACCOUNT_ID = "e6011e48b7014ef83c77e3c767dac6cf"
ENRICHMENT_DRY_RUN = "true"
# INTERNAL_API_KEY is set via `wrangler secret put INTERNAL_API_KEY`
# Inbound-email failures (parse / extract / submit) get forwarded here.
# Must be a verified destination address in Cloudflare Email Routing —
# Cloudflare rejects forward() to unverified addresses with a 451 SMTP
# error. Verify in Dashboard → Email → Email Routing → Destination
# addresses before changing this.
SUBMIT_ADMIN_FORWARD = "jtarboxme@gmail.com"

# Service Binding to the main app — DISABLED 2026-05-03 because the bare
# `service = "takemetothefair"` form errors with Cloudflare API code 10143
# ("Worker 'takemetothefair' not found"). The binding API expects a Worker
# target; our main app is on Pages, which needs a different binding syntax
# that's still TBD. The MCP code paths are written defensively (env.MAIN_APP
# is optional; both triggerIndexNow and the cron scheduled handler fall back
# to public HTTPS via MAIN_APP_URL + INTERNAL_API_KEY). Re-enable once we
# verify the correct Pages-target syntax against the live API.
# [[services]]
# binding = "MAIN_APP"
# service = "takemetothefair"

[[routes]]
pattern = "mcp.meetmeatthefair.com"
custom_domain = true

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "80685c98cb744582bb528587d20e647a"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "MeetMeAtTheFairMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MeetMeAtTheFairMCP"]

# Cron Triggers — scheduled tasks fan out to main-app sweep endpoints via
# the MAIN_APP service binding. Conservative rollout: only the
# recommendations-scan is enabled today (it's idempotent + low-cost). Add
# additional crons here as confidence in the pattern builds; the scheduled
# handler in src/index.ts dispatches based on which cron expression fires.
[triggers]
# "0 6 * * *"     → daily heavy: recommendations scan + GSC URL Inspection sweep
#                   + time-to-index reconcile (06:00 UTC, overnight NA)
# "10 6 * * *"    → GW1.3 holdout-sampling cron — 10 min after the 06:00
#                   batch so the heavy work doesn't contend (added 2026-06-03).
#                   See src/goodwill/holdout-sampling.ts for the per-event
#                   fetch+extract cost and the cap rationale.
# "*/10 * * * *"  → §6.3 KPI state-machine recompute (light, ~5 INSERTs per fire)
# "0 * * * *"     → hourly: drain pending_search_pings older than 1 hour
#                   (safety net for forgotten flushes after deferred-ingest runs)
# "0 7 * * *"     → I1 vendor-enrichment nightly sweep (≤100 vendors). Fires
#                   after the 06:00/06:10 heavy batch so Browser-Rendering
#                   fetches don't contend with the recommendations/GSC work.
# "0 8 * * *"     → OPE-36 promoter-enrichment nightly sweep (≤50 promoters),
#                   staggered 1h after the vendor sweep to space Browser-Rendering.
crons = ["0 6 * * *", "10 6 * * *", "*/10 * * * *", "0 * * * *", "0 7 * * *", "0 8 * * *"]

# Cloudflare Email Service — outbound sending binding (public beta).
# Replaced Resend HTTP integration in the EMAIL_JOBS consumer. Without
# `destination_address` / `allowed_destination_addresses` this binding
# can send to any external address (new beta behavior). Pair this with
# the Email Sending domain onboarding step in Compute → Email Service
# → Email Sending → Onboard Domain (adds cf-bounce.* DNS records).
#
# To restrict outbound from-addresses later, add e.g.:
#   allowed_sender_addresses = ["notify@meetmeatthefair.com"]
[[send_email]]
name = "EMAIL"

# Workers AI binding for the inbound-email intent classifier (Phase C.1).
# Used by mcp-server/src/intent-classifier.ts:classifyIntent — calls
# env.AI.run("@cf/meta/llama-3.1-8b-instruct", ...). Without this binding
# the entrypoint's computeRouting() falls back to address-only routing
# (routing_source='address_only'); no emails bounce, but the classifier
# is effectively dormant. Added 2026-05-20 so the C.1 ship is actually
# active in production.
[ai]
binding = "AI"

# Queue producers — also wired here so MCP tools can enqueue (e.g., MCP's
# create_event triggers an IndexNow ping; same code path as the main app).
[[queues.producers]]
binding = "EMAIL_JOBS"
queue = "email-jobs"

[[queues.producers]]
binding = "INDEXNOW_PINGS"
queue = "indexnow-pings"

# GW1.1 (2026-06-03) — ingest_addverify discrepancy capture. Producer
# binding is here so the MCP enqueue endpoint (POST /api/admin/internal/
# enqueue-discrepancy) and future MCP-internal callers can both push
# messages. Consumer below drains and calls captureDiscrepancy from
# src/goodwill/capture.ts.
[[queues.producers]]
binding = "EVENT_DISCREPANCIES"
queue = "event-discrepancies"

# SYN1 (2026-06-12) — producer binding so the MCP update_* tools can enqueue
# a syndication trigger (the main app enqueues the same queue from its admin
# PATCH routes). Consumer below drains and delivers signed webhooks.
[[queues.producers]]
binding = "SYNDICATION_CHANGES"
queue = "syndication-changes"

# I1 (2026-06-13) — vendor-enrichment jobs. Producer here so the nightly cron
# selector + the enrich_vendor MCP tool (one-off) + the future post-create hook
# can all enqueue. Consumer below renders the vendor site and stages proposals.
[[queues.producers]]
binding = "VENDOR_ENRICHMENT"
queue = "vendor-enrichment"

# OPE-36 (2026-07-01) — promoter-enrichment jobs. Producer here so the nightly
# selector + the enrich_promoter MCP tool can enqueue; consumer below fetches the
# promoter site and stages fill-empty-only candidates.
[[queues.producers]]
binding = "PROMOTER_ENRICHMENT"
queue = "promoter-enrichment"

# Queue consumers — only Workers can consume (Pages projects cannot), so
# all queue dispatch logic lives in this Worker.
#
# Tuning knobs:
# - max_batch_size: drain up to N messages per invocation. IndexNow's API
#   accepts up to 10k URLs per submit, so batching is high-leverage. Email
#   has no batch endpoint, so size=1 is fine — bigger batches just mean
#   longer per-invocation runtime.
# - max_batch_timeout: how long to wait for a batch to fill before draining
#   what we have. Longer = better batching, but delays delivery.
# - max_retries: queue-level retry count before message goes to DLQ.
#   Defaults to 3. Beyond that, Cloudflare drops the message ENTIRELY unless a
#   dead_letter_queue is set — so every consumer below names one. The DLQs are
#   parking lots for operator review (no consumer), same as the syndication /
#   vendor-enrichment DLQs. Operator must create each one before deploy:
#     wrangler queues create email-jobs-dlq
#     wrangler queues create indexnow-pings-dlq
#     wrangler queues create event-discrepancies-dlq
#   (a referenced dead_letter_queue must already exist or `wrangler deploy` fails).
[[queues.consumers]]
queue = "email-jobs"
max_batch_size = 10
max_batch_timeout = 5     # seconds — emails should feel near-real-time
max_retries = 3
# Without this, a CF-Email outage outlasting 3 retries silently DROPPED
# user-facing mail (approval/notification). Now it parks for replay instead.
dead_letter_queue = "email-jobs-dlq"

[[queues.consumers]]
queue = "indexnow-pings"
max_batch_size = 100      # batch many URLs into one Bing submit
max_batch_timeout = 30    # tolerable; IndexNow doesn't need to be instant
max_retries = 3
# Serialize delivery: one batch at a time. Without this, the consumer
# autoscales concurrency on backlog and fires parallel Bing submits — the exact
# 429 storm the REL4/REL6 app-level circuit breaker fights. =1 is a structural
# rate guard (IndexNow is low-volume and coalesces 100 URLs/call, so throughput
# is a non-issue).
max_concurrency = 1
dead_letter_queue = "indexnow-pings-dlq"

# GW1.1 ingest_addverify discrepancy capture (2026-06-03). Same risk
# profile as IndexNow — non-user-facing async write, can tolerate a
# few-second batching window. Smaller batch than IndexNow because each
# message is its own (eventId, fieldClass) write rather than a list to
# coalesce. The 24-hour idempotence guard inside captureDiscrepancy
# tolerates duplicate-message retries without producing duplicate rows.
[[queues.consumers]]
queue = "event-discrepancies"
max_batch_size = 25
max_batch_timeout = 15
max_retries = 3
dead_letter_queue = "event-discrepancies-dlq"

# SYN1 syndication dispatch (2026-06-12). Each message is one entity whose
# mirrored fields changed; the consumer drains that entity's unprocessed
# syndication_outbox rows, fans out to subscribers, and POSTs HMAC-signed
# webhooks. Small batch — each message resolves to its own fan-out + external
# HTTP, so big batches just lengthen a single invocation. Delivery is
# idempotent (consumer-side: highest event_version wins), so retries are safe.
# Persistent failures land in the DLQ for operator review.
[[queues.consumers]]
queue = "syndication-changes"
max_batch_size = 10
max_batch_timeout = 10
max_retries = 5
dead_letter_queue = "syndication-changes-dlq"

# I1 vendor-enrichment (2026-06-13). Each message is one vendor → one Browser-
# Rendering fetch + extract + stage. Small batch because each message is its
# own (rate-limited) browser fetch — Cloudflare caps new browsers at 1/sec, so
# big batches just lengthen a single invocation. A fetch miss is acked (a dead
# site is a signal, not a retry); only unexpected DB errors retry → DLQ.
[[queues.consumers]]
queue = "vendor-enrichment"
max_batch_size = 5
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "vendor-enrichment-dlq"

# OPE-36 promoter-enrichment (2026-07-01). One message = one promoter → one
# Browser-Rendering fetch + extract + stage. Same small-batch tuning as vendor
# (browser fetches are rate-limited). Fetch miss is acked; DB errors retry → DLQ.
# DLQ must be created before deploy: `wrangler queues create promoter-enrichment-dlq`.
[[queues.consumers]]
queue = "promoter-enrichment"
max_batch_size = 5
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "promoter-enrichment-dlq"

# Cloudflare Workflows — durable multi-step jobs that survive Worker
# restarts. WorkflowEntrypoint subclasses live in src/workflows/ and
# must be exported from the Worker entry (src/index.ts) for Cloudflare
# to register them. See docs/cloudflare-workflows-audit.md for the
# adoption rationale per workflow.
[[workflows]]
name = "schema-org-sync"
binding = "SCHEMA_ORG_SYNC"
class_name = "SchemaOrgSyncWorkflow"

# Daily cron-triggered sweep (was a chunked HTTP loop inside scheduled());
# Phase 2 of the workflows audit. Each chunk is a step.do with retry.
[[workflows]]
name = "recommendations-scan"
binding = "RECOMMENDATIONS_SCAN"
class_name = "RecommendationsScanWorkflow"

# Daily cron-triggered drift sweep — same pattern as recommendations-scan.
[[workflows]]
name = "event-date-drift"
binding = "EVENT_DATE_DRIFT"
class_name = "EventDateDriftWorkflow"

# Inbound email orchestrator. Fired by the email() entrypoint, one
# instance per received message. See workflows/inbound-email.ts.
[[workflows]]
name = "inbound-email"
binding = "INBOUND_EMAIL"
class_name = "InboundEmailWorkflow"
