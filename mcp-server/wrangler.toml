name = "meetmeatthefair-mcp"
main = "src/index.ts"
workers_dev = true
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Smart Placement: same rationale as the main app — most MCP tools are
# D1-bound, so Cloudflare placing the Worker near the DB is the right
# default. No code change.
[placement]
mode = "smart"

[[d1_databases]]
binding = "DB"
database_name = "takemetothefair-db"
database_id = "d449e416-3814-48a6-b9e8-b676333b2cdc"

[vars]
MAIN_APP_URL = "https://meetmeatthefair.com"
# INTERNAL_API_KEY is set via `wrangler secret put INTERNAL_API_KEY`

# Service Binding to the main app's Pages project. Lets us call internal
# endpoints (currently /api/internal/indexnow) without the public-internet
# round-trip OR the X-Internal-Key auth ceremony — service-bound calls are
# trusted-by-default by virtue of being same-account same-project. The fetch
# helper still falls back to public HTTPS if MAIN_APP isn't bound (local dev,
# where Pages services aren't easy to wire up).
[[services]]
binding = "MAIN_APP"
service = "takemetothefair"

[[routes]]
pattern = "mcp.meetmeatthefair.com"
custom_domain = true

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "80685c98cb744582bb528587d20e647a"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "MeetMeAtTheFairMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MeetMeAtTheFairMCP"]
