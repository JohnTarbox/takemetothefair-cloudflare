name = "meetmeatthefair-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "takemetothefair-db"
database_id = "d449e416-3814-48a6-b9e8-b676333b2cdc"

[vars]
MAIN_APP_URL = "https://meetmeatthefair.com"
# INTERNAL_API_KEY is set via `wrangler secret put INTERNAL_API_KEY`

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "80685c98cb744582bb528587d20e647a"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "MeetMeAtTheFairMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MeetMeAtTheFairMCP"]
