# Main app — Cloudflare WORKER via @opennextjs/cloudflare (migrated off the
# deprecated @cloudflare/next-on-pages Pages adapter, 2026-06-10). The Pages
# 25 MiB *uncompressed* Function cap was at the redline; Workers cap on
# *gzipped* size (~3.85 MiB here vs 10 MiB paid) gives real headroom.
name = "meetmeatthefair-app"
main = ".open-next/worker.js"
compatibility_date = "2026-06-10"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Smart Placement: run near the slow dependency (D1) rather than the user.
[placement]
mode = "smart"

[ai]
binding = "AI"

# Browser Rendering account id (non-secret); the token is a Worker secret
# CLOUDFLARE_BROWSER_RENDERING_TOKEN. Used by import-url/fetch escalation.
[vars]
CLOUDFLARE_ACCOUNT_ID = "e6011e48b7014ef83c77e3c767dac6cf"
# CAL1 — flip to "true" to serve the SSR Month calendar at /events?view=calendar
# (Month-only @jonnyboats/calendar-react). Default OFF = legacy client calendar.
# Temporarily ON for live prod verification (Step 7) — flip back to "false" after.
CAL1_SSR_MONTH = "true"
# CAL2 — flip to "true" to add the Agenda + Year sub-views to the SSR calendar
# (?cal_view=agenda|year). Requires CAL1_SSR_MONTH = "true". Default OFF = Month only.
# Temporarily ON for live prod verification — flip back to "false" after.
CAL2_VIEWS = "true"
# OPE-163 — customer-facing reply send gate for the /admin/inbound-emails Reply
# panel. The endpoint refuses to enqueue unless this is "true"; the MCP consumer
# enforces the same flag as the authoritative hard stop. Shipped OFF (OPE-6).
# To go live, flip to "true" here AND on the MCP Worker (mcp-server/wrangler.toml),
# then redeploy — or override both in the dashboard.
EMAIL_REPLY_ENABLED = "false"
# OPE-169 — newsletter BROADCAST gate. POST /api/admin/newsletter/send refuses a
# real broadcast to the subscriber list unless this is "true" (a single-address
# test_recipient send is always allowed).
#
# OPE-284 — ARMED. John authorized go-live 2026-07-23. Sending still requires his
# own click on the OPE-231 approve link; this flag only makes that click work.
#
# ⚠️ Do NOT "just override it in the dashboard" — a plain-text [vars] entry set in
# the dashboard is WIPED by the next `wrangler deploy`, which re-applies this file.
# That is exactly what happened here: the var was set in the dashboard ~07-13, the
# 2026-07-16 broadcast went out on it (6 recipients, ledgered), a later deploy
# silently reverted it to "false", and the 07-23 approve click hit "sending is
# turned off". This file is the only durable home for the flag. (Secrets survive a
# deploy; vars do not.)
NEWSLETTER_SEND_ENABLED = "true"

# OPE-232 — CAN-SPAM physical postal address rendered in the newsletter footer.
# The digest HTML is rendered in THIS (main-app) worker via
# /api/admin/newsletter/send → newsletterDigestTemplate; MAILING_ADDRESS was only
# set on the MCP worker, so the main-app render fell back to a generic placeholder.
# Value matches the MCP worker's secret. NOTE: OPE-232 ticket prose said "20 Main
# Street"; this matches the operator-set MCP value — confirm the legal address in
# the review-first test render before the first real broadcast.
MAILING_ADDRESS = "18 Main ST, Phillips, ME 04966"

[[d1_databases]]
binding = "DB"
database_name = "takemetothefair-db"
database_id = "d449e416-3814-48a6-b9e8-b676333b2cdc"
migrations_dir = "drizzle"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b7aeca316e7a41108fd375be2e152cff"

# R2 — vendor assets (Enhanced Profile logos/galleries), served at
# cdn.meetmeatthefair.com.
[[r2_buckets]]
binding = "VENDOR_ASSETS"
bucket_name = "mmatf-vendor-assets"

# R2 — OpenNext ISR incremental cache. open-next.config.ts wires
# r2IncrementalCache, which reads/writes rendered ISR output under the
# `NEXT_INC_CACHE_R2_BUCKET` binding (default prefix "incremental-cache").
# Bucket created 2026-06-10.
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "mmatf-isr-cache"

# Queue producers. On Workers these are FIRST-CLASS (unlike Pages, where they
# were a no-op and code fell back to the MCP HTTP proxy — see
# src/lib/queues/producers.ts; that fallback is now dead and can be removed in
# a follow-up). The MCP Worker remains the consumer (mcp-server/wrangler.toml).
[[queues.producers]]
binding = "EMAIL_JOBS"
queue = "email-jobs"

[[queues.producers]]
binding = "INDEXNOW_PINGS"
queue = "indexnow-pings"

[[queues.producers]]
binding = "EVENT_DISCREPANCIES"
queue = "event-discrepancies"

# SYN1 (2026-06-12) — syndication change triggers. Producer here (admin
# venue/event PATCH routes) + in the MCP Worker (update_* tools); consumer
# is the MCP Worker. Operator: `wrangler queues create syndication-changes`
# (+ a `syndication-changes-dlq` dead-letter) before first deploy.
[[queues.producers]]
binding = "SYNDICATION_CHANGES"
queue = "syndication-changes"

# ── Apex route ─────────────────────────────────────────────────────────────
# This Worker serves meetmeatthefair.com/* directly (cutover 2026-06-10). The
# old K2 apex-worker (meetmeatthefair-edge) that used to proxy + rewrite status
# was retired by this cutover and deleted (B5, 2026-06-12).
# NOTE: error/notFound() responses are soft-200 on ISR routes under
# @opennextjs/cloudflare — the status-rewrite did NOT become "moot via real
# 500s" as first assumed; it's an accepted soft-status + noindex tradeoff
# (docs/mig4-soft-404-opennext-isr.md).
# Rollback = re-point this hostname at the last pre-migration Pages deployment
# (see docs/opennext-cutover-runbook.md).
[[routes]]
pattern = "meetmeatthefair.com/*"
zone_name = "meetmeatthefair.com"

# Workflows can now be bound directly (Pages couldn't) — optional follow-up
# cleanup to drop the MCP HTTP-proxy indirection for schema-org-sync etc.
