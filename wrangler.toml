name = "takemetothefair"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Smart Placement: lets Cloudflare run the Worker in the region nearest the
# slow dependencies (D1, in our case) rather than nearest the user. For an
# app that's mostly DB-bound on every render, this typically improves p50/p95
# without us needing to think about region. No code change needed.
[placement]
mode = "smart"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "takemetothefair-db"
database_id = "d449e416-3814-48a6-b9e8-b676333b2cdc"
migrations_dir = "drizzle"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b7aeca316e7a41108fd375be2e152cff"

# R2 bucket for vendor assets (Enhanced Profile logos and galleries).
# Public bucket served at cdn.meetmeatthefair.com — see CLAUDE.md.
# Phase 1 does not write to R2 from code; admin uploads via dashboard or
# `wrangler r2 object put`. The binding is here for future use.
[[r2_buckets]]
binding = "VENDOR_ASSETS"
bucket_name = "mmatf-vendor-assets"

# Queue producers: writes go from request handlers to a queue, the MCP
# Worker drains and dispatches asynchronously. Lets us return responses
# without waiting for IndexNow API or Resend round-trips.
#
# Pages projects can produce but not consume — see mcp-server/wrangler.toml
# for the consumer registration.
[[queues.producers]]
binding = "EMAIL_JOBS"
queue = "email-jobs"

[[queues.producers]]
binding = "INDEXNOW_PINGS"
queue = "indexnow-pings"

# Workflow binding — DISABLED 2026-05-03. Cloudflare Pages projects don't
# accept [[workflows]] in wrangler.toml ("Configuration file for Pages
# projects does not support workflows" error from wrangler). Only Workers
# can bind to Workflow classes.
#
# The Workflow class is registered correctly in the MCP Worker (see
# mcp-server/wrangler.toml). To trigger from the main app, fetch the MCP
# server's /api/admin/workflows/* HTTP endpoints (added by the same hotfix
# that disabled this binding) using the existing INTERNAL_API_KEY auth.
# Same Pages-vs-Workers limitation we hit with [[services]] in PR #71.
# [[workflows]]
# name = "schema-org-sync"
# binding = "SCHEMA_ORG_SYNC"
# class_name = "SchemaOrgSyncWorkflow"
# script_name = "meetmeatthefair-mcp"
