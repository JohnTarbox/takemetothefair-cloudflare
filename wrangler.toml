name = "takemetothefair"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Smart Placement: lets Cloudflare run the Worker in the region nearest the
# slow dependencies (D1, in our case) rather than nearest the user. For an
# app that's mostly DB-bound on every render, this typically improves p50/p95
# without us needing to think about region. No code change needed.
[placement]
mode = "smart"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "takemetothefair-db"
database_id = "d449e416-3814-48a6-b9e8-b676333b2cdc"
migrations_dir = "drizzle"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b7aeca316e7a41108fd375be2e152cff"

# R2 bucket for vendor assets (Enhanced Profile logos and galleries).
# Public bucket served at cdn.meetmeatthefair.com — see CLAUDE.md.
# Phase 1 does not write to R2 from code; admin uploads via dashboard or
# `wrangler r2 object put`. The binding is here for future use.
[[r2_buckets]]
binding = "VENDOR_ASSETS"
bucket_name = "mmatf-vendor-assets"
