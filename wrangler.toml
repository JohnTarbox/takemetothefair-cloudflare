# Main app — Cloudflare WORKER via @opennextjs/cloudflare (migrated off the
# deprecated @cloudflare/next-on-pages Pages adapter, 2026-06-10). The Pages
# 25 MiB *uncompressed* Function cap was at the redline; Workers cap on
# *gzipped* size (~3.85 MiB here vs 10 MiB paid) gives real headroom.
name = "meetmeatthefair-app"
main = ".open-next/worker.js"
compatibility_date = "2026-06-10"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Smart Placement: run near the slow dependency (D1) rather than the user.
[placement]
mode = "smart"

[ai]
binding = "AI"

# Browser Rendering account id (non-secret); the token is a Worker secret
# CLOUDFLARE_BROWSER_RENDERING_TOKEN. Used by import-url/fetch escalation.
[vars]
CLOUDFLARE_ACCOUNT_ID = "e6011e48b7014ef83c77e3c767dac6cf"

[[d1_databases]]
binding = "DB"
database_name = "takemetothefair-db"
database_id = "d449e416-3814-48a6-b9e8-b676333b2cdc"
migrations_dir = "drizzle"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "b7aeca316e7a41108fd375be2e152cff"

# R2 — vendor assets (Enhanced Profile logos/galleries), served at
# cdn.meetmeatthefair.com.
[[r2_buckets]]
binding = "VENDOR_ASSETS"
bucket_name = "mmatf-vendor-assets"

# R2 — OpenNext ISR incremental cache. open-next.config.ts wires
# r2IncrementalCache, which reads/writes rendered ISR output under the
# `NEXT_INC_CACHE_R2_BUCKET` binding (default prefix "incremental-cache").
# Bucket created 2026-06-10.
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "mmatf-isr-cache"

# Queue producers. On Workers these are FIRST-CLASS (unlike Pages, where they
# were a no-op and code fell back to the MCP HTTP proxy — see
# src/lib/queues/producers.ts; that fallback is now dead and can be removed in
# a follow-up). The MCP Worker remains the consumer (mcp-server/wrangler.toml).
[[queues.producers]]
binding = "EMAIL_JOBS"
queue = "email-jobs"

[[queues.producers]]
binding = "INDEXNOW_PINGS"
queue = "indexnow-pings"

[[queues.producers]]
binding = "EVENT_DISCREPANCIES"
queue = "event-discrepancies"

# ── CUTOVER (Phase 5) — uncomment to claim the apex route ──────────────────
# Until then the Worker is reachable only at its *.workers.dev URL (preview).
# At cutover: deploy WITH this route (it folds in the old apex-worker, whose
# K1 status-rewrite + Location-rewrite become moot on Workers — real 500s, no
# pages.dev host). Rollback = re-point this route to the Pages project (kept
# live through the soak) by removing this block + redeploying the apex-worker.
# CUTOVER 2026-06-10: route CLAIMED. Deploying this Worker reassigns
# meetmeatthefair.com/* from the apex-worker (meetmeatthefair-edge) to here.
# Rollback = redeploy the apex-worker (it reclaims the route → Pages).
[[routes]]
pattern = "meetmeatthefair.com/*"
zone_name = "meetmeatthefair.com"

# Workflows can now be bound directly (Pages couldn't) — optional follow-up
# cleanup to drop the MCP HTTP-proxy indirection for schema-org-sync etc.
